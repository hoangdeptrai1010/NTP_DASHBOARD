spring:
  application:
    name: hospital-dashboard-api
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/orclpdb}
    username: ${DB_USER:dashboard}
    password: ${DB_PASS:dashboard}
    driver-class-name: ${DB_DRIVER:oracle.jdbc.OracleDriver}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: false
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
  jackson:
    serialization:
      write-dates-as-timestamps: false

  profiles:
    active: dev

server:
  port: ${SERVER_PORT:8081}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-me-dev-secret-key-change-me}
    access-token-minutes: 15
    refresh-token-days: 7

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.hospital.dashboard: INFO
